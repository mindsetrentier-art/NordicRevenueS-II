<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <!-- Cinematic Dark Gradient -->
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12141D"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    
    <!-- Soft Light Streaks -->
    <radialGradient id="streak" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A5FFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1A5FFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo Gradients -->
    <linearGradient id="logoBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4CB8FF"/>
      <stop offset="100%" stop-color="#1A5FFF"/>
    </linearGradient>
    <linearGradient id="logoSilver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E0E5"/>
      <stop offset="50%" stop-color="#F5F5FA"/>
      <stop offset="100%" stop-color="#B8B8C2"/>
    </linearGradient>

    <filter id="glowBanner" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bannerBg)"/>
  
  <!-- Subtle Streaks -->
  <ellipse cx="800" cy="100" rx="400" ry="200" fill="url(#streak)" transform="rotate(-20, 800, 100)"/>
  <ellipse cx="200" cy="400" rx="300" ry="150" fill="url(#streak)" transform="rotate(15, 200, 400)"/>

  <!-- Left Side: Branding -->
  <g transform="translate(100, 120)">
    <!-- Icon -->
    <g transform="scale(0.4)">
      <rect width="512" height="512" rx="114" ry="114" fill="#0B0B0F" stroke="#1A1C25" stroke-width="2"/>
      <g transform="translate(256, 256) scale(0.75) translate(-160, -120)">
        <path d="M 0,240 L 0,0 L 100,240 L 100,0" stroke="url(#logoBlue)" stroke-width="50" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowBanner)"/>
        <path d="M 170,240 L 170,0 C 270,0 270,110 170,110 L 250,240" stroke="url(#logoSilver)" stroke-width="50" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
    
    <!-- Text -->
    <text x="0" y="280" font-family="Inter, sans-serif" font-weight="900" font-size="64" fill="white" letter-spacing="-2">NordicRevenueS</text>
    <text x="0" y="330" font-family="Inter, sans-serif" font-weight="300" font-size="24" fill="#888E96" letter-spacing="4" opacity="0.8">POWER IN SIMPLICITY</text>
  </g>

  <!-- Right Side: Phone Mockups (Stylized) -->
  <g transform="translate(650, 100)">
    <!-- Phone 1 (Back) -->
    <rect x="40" y="40" width="220" height="440" rx="40" ry="40" fill="#0B0B0F" stroke="#1A1C25" stroke-width="4" opacity="0.5" transform="rotate(-10)"/>
    
    <!-- Phone 2 (Front) -->
    <g transform="translate(110, 20) rotate(5)">
      <rect width="220" height="440" rx="40" ry="40" fill="#0B0B0F" stroke="#1A1C25" stroke-width="2" filter="url(#glowBanner)"/>
      <!-- Screen content (Simplified Dashboard) -->
      <rect x="20" y="40" width="180" height="20" rx="10" fill="#1A1C25"/>
      <rect x="20" y="80" width="80" height="80" rx="15" fill="#1A5FFF" fill-opacity="0.2"/>
      <rect x="110" y="80" width="90" height="30" rx="10" fill="#1A1C25"/>
      <rect x="110" y="120" width="90" height="30" rx="10" fill="#1A1C25"/>
      
      <!-- Graph mockup -->
      <path d="M 30,350 Q 80,300 120,330 T 190,280" stroke="#4CB8FF" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="190" cy="280" r="4" fill="#4CB8FF" filter="url(#glowBanner)"/>
      
      <rect x="20" y="380" width="180" height="40" rx="10" fill="#1A5FFF" fill-opacity="0.1"/>
    </g>
  </g>
</svg>
