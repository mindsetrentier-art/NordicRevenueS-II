<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep Obsidian / Midnight Black gradient for sheer luxury -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1C20"/>
      <stop offset="50%" stop-color="#0A0C10"/>
      <stop offset="100%" stop-color="#020203"/>
    </linearGradient>

    <!-- Warm, authentic Premium Gold -->
    <linearGradient id="gold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7730"/>
      <stop offset="25%" stop-color="#C5A059"/>
      <stop offset="50%" stop-color="#FDF3B8"/>
      <stop offset="75%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#AA8035"/>
    </linearGradient>
    
    <!-- Subtle glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Luxurious dark background, rounded corners if used as maskable -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  
  <!-- Subtle inner border for depth -->
  <rect x="20" y="20" width="472" height="472" rx="90" ry="90" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  
  <!-- Outer Gold Frame -->
  <rect x="40" y="40" width="432" height="432" rx="72" ry="72" fill="none" stroke="url(#gold)" stroke-width="3" stroke-opacity="0.75"/>

  <!-- Star/Diamond elegant centerpiece backdrop -->
  <path d="M 256,110 L 268,244 L 402,256 L 268,268 L 256,402 L 244,268 L 110,256 L 244,244 Z" fill="url(#gold)" opacity="0.1" filter="url(#glow)"/>

  <!-- Central elegant Monogram N -->
  <g transform="translate(180, 160)" stroke="url(#gold)" fill="none" stroke-linejoin="miter">
    <!-- N Left Stem -->
    <path d="M 15,190 L 15,0" stroke-width="14" stroke-linecap="square"/>
    <!-- N Diagonal very thin -->
    <path d="M 15,0 L 137,190" stroke-width="8" stroke-linecap="square"/>
    <!-- N Right Stem -->
    <path d="M 137,190 L 137,0" stroke-width="14" stroke-linecap="square"/>
  </g>
  
  <!-- A subtle minimalist dot/jewel for the "R" implied or just high-end touch -->
  <circle cx="340" cy="160" r="8" fill="url(#gold)"/>

</svg>
