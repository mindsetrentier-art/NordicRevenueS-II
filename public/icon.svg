<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep navy / near-black background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12141D"/>
      <stop offset="50%" stop-color="#0B0B0F"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>

    <!-- Blue to Icy Cyan Gradient (Left Shape) -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4CB8FF"/>
      <stop offset="100%" stop-color="#1A5FFF"/>
    </linearGradient>

    <!-- Metallic Silver Gradient (Right Shape) -->
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E0E5"/>
      <stop offset="50%" stop-color="#F5F5FA"/>
      <stop offset="100%" stop-color="#B8B8C2"/>
    </linearGradient>

    <!-- Refined Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- iOS-style rounded background -->
  <rect width="512" height="512" rx="114" ry="114" fill="url(#bgGradient)"/>

  <!-- Minimalist Monogram NR -->
  <g transform="translate(256, 256) scale(0.75) translate(-160, -120)">
    <!-- NR Symbol -->
    <!-- Geometric N (Left) -->
    <path d="M 0,240 L 0,0 L 100,240 L 100,0" 
          stroke="url(#blueGradient)" 
          stroke-width="50" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#glow)" />
    
    <!-- Geometric R (Right) -->
    <path d="M 170,240 L 170,0 C 270,0 270,110 170,110 L 250,240" 
          stroke="url(#silverGradient)" 
          stroke-width="50" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>
